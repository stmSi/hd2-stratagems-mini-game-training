<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<title>$GODOT_PROJECT_NAME</title>
	$GODOT_HEAD_INCLUDE
	<style>
		:root {
			--ink: #08111a;
			--ink-deep: #050b12;
			--panel: rgba(7, 14, 22, 0.78);
			--panel-border: rgba(255, 214, 140, 0.28);
			--text: #f7f0da;
			--muted: rgba(247, 240, 218, 0.68);
			--accent: #f3b254;
			--accent-strong: #ffd27e;
			--accent-cool: rgba(89, 170, 255, 0.18);
			--danger: #ff8576;
			--progress-width: 8%;
			--loader-background-image: none;
		}

		html, body, #canvas {
			margin: 0;
			padding: 0;
			border: 0;
			width: 100%;
			height: 100%;
		}

		html, body {
			overflow: hidden;
			background: var(--ink);
			color: var(--text);
			font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
			touch-action: none;
		}

		body {
			position: relative;
		}

		#canvas {
			display: block;
			outline: none;
		}

		#status {
			position: fixed;
			inset: 0;
			display: grid;
			place-items: center;
			overflow: hidden;
			background: var(--ink);
		}

		#status::before {
			content: "";
			position: absolute;
			inset: -6%;
				background:
					linear-gradient(180deg, rgba(4, 8, 14, 0.42), rgba(4, 8, 14, 0.84)),
					radial-gradient(circle at 84% 14%, rgba(255, 208, 120, 0.22), transparent 28%),
					radial-gradient(circle at 16% 86%, rgba(71, 137, 211, 0.18), transparent 30%),
					var(--loader-background-image) center center / cover no-repeat;
			filter: blur(8px) saturate(0.9);
			transform: scale(1.04);
		}

		#status::after {
			content: "";
			position: absolute;
			inset: 0;
			background:
				repeating-linear-gradient(
					180deg,
					rgba(255, 255, 255, 0.02) 0px,
					rgba(255, 255, 255, 0.02) 1px,
					transparent 1px,
					transparent 4px
				);
			opacity: 0.22;
			pointer-events: none;
		}

		#status.hidden {
			display: none;
		}

		#status-panel {
			position: relative;
			z-index: 1;
			width: min(720px, calc(100vw - 48px));
			padding: 28px 30px 26px;
			border: 1px solid var(--panel-border);
			border-radius: 22px;
			background:
				linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent 20%),
				var(--panel);
			box-shadow:
				0 28px 80px rgba(0, 0, 0, 0.42),
				0 0 0 1px rgba(255, 255, 255, 0.02) inset;
			backdrop-filter: blur(12px);
		}

		#status-panel::before {
			content: "";
			position: absolute;
			inset: 0;
			border-radius: inherit;
			background:
				linear-gradient(90deg, rgba(255, 210, 126, 0.16), transparent 18%),
				linear-gradient(180deg, transparent 0%, rgba(89, 170, 255, 0.08) 100%);
			pointer-events: none;
		}

		.loader-kicker {
			position: relative;
			display: inline-block;
			padding: 6px 10px;
			border: 1px solid rgba(255, 210, 126, 0.18);
			border-radius: 999px;
			background: rgba(255, 210, 126, 0.08);
			color: var(--accent-strong);
			font-size: 12px;
			font-weight: 700;
			letter-spacing: 0.24em;
			text-transform: uppercase;
		}

		.loader-title {
			margin: 18px 0 6px;
			font-size: clamp(34px, 6vw, 64px);
			font-weight: 800;
			letter-spacing: 0.08em;
			line-height: 0.95;
			text-transform: uppercase;
		}

		.loader-subtitle {
			color: var(--muted);
			font-size: clamp(13px, 2vw, 17px);
			letter-spacing: 0.22em;
			text-transform: uppercase;
		}

		.loader-divider {
			height: 1px;
			margin: 18px 0 18px;
			background:
				linear-gradient(90deg, rgba(255, 210, 126, 0.9), rgba(255, 210, 126, 0.16) 34%, rgba(255, 255, 255, 0.04) 100%);
		}

		.loader-row {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 18px;
			margin-bottom: 10px;
			font-size: 14px;
			letter-spacing: 0.08em;
			text-transform: uppercase;
		}

		#status-phase {
			color: var(--accent-strong);
		}

		#status-percent {
			color: rgba(255, 255, 255, 0.8);
			font-weight: 700;
		}

		#status-progress {
			position: relative;
			height: 18px;
			border: 1px solid rgba(255, 210, 126, 0.24);
			border-radius: 999px;
			background:
				linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(0, 0, 0, 0.12)),
				rgba(4, 10, 16, 0.88);
			overflow: hidden;
		}

		#status-progress-bar {
			position: absolute;
			inset: 0 auto 0 0;
			width: var(--progress-width);
			min-width: 8%;
			border-radius: inherit;
			background:
				linear-gradient(90deg, rgba(255, 255, 255, 0.32), rgba(255, 255, 255, 0)),
				repeating-linear-gradient(
					-45deg,
					rgba(255, 255, 255, 0.12) 0px,
					rgba(255, 255, 255, 0.12) 12px,
					rgba(255, 255, 255, 0.02) 12px,
					rgba(255, 255, 255, 0.02) 24px
				),
				linear-gradient(90deg, #c58528, #f3b254 54%, #ffd27e);
			box-shadow: 0 0 28px rgba(243, 178, 84, 0.24);
			animation: loader-stripes 1.1s linear infinite;
			transition: width 180ms ease-out;
		}

		.loader-meta {
			display: flex;
			flex-wrap: wrap;
			gap: 12px 18px;
			margin-top: 18px;
			color: var(--muted);
			font-size: 12px;
			letter-spacing: 0.12em;
			text-transform: uppercase;
		}

		.loader-meta span {
			padding: 6px 10px;
			border-radius: 999px;
			background: rgba(255, 255, 255, 0.05);
		}

		#status-notice {
			position: relative;
			z-index: 2;
			display: none;
			margin-top: 18px;
			padding: 14px 16px;
			border: 1px solid rgba(255, 133, 118, 0.32);
			border-radius: 14px;
			background: rgba(73, 20, 15, 0.7);
			color: #ffe8e2;
			font-size: 14px;
			line-height: 1.5;
			white-space: pre-line;
		}

		#status.notice-mode #status-notice {
			display: block;
		}

		@keyframes loader-stripes {
			from {
				background-position: 0 0, 0 0, 0 0;
			}
			to {
				background-position: 0 0, 34px 0, 0 0;
			}
		}

		@media (max-width: 640px) {
			#status-panel {
				width: min(100vw - 24px, 720px);
				padding: 22px 20px 20px;
				border-radius: 18px;
			}

			.loader-kicker,
			.loader-meta,
			.loader-subtitle,
			.loader-row {
				letter-spacing: 0.1em;
			}

			.loader-meta {
				gap: 8px;
			}
		}
	</style>
</head>
<body>
	<canvas id="canvas">
		Your browser does not support the canvas tag.
	</canvas>

	<noscript>
		Your browser does not support JavaScript.
	</noscript>

	<div id="status">
		<div id="status-panel">
			<div class="loader-kicker">Super Earth Uplink</div>
			<div class="loader-title">HELLDIVERS 2</div>
			<div class="loader-subtitle">Stratagem Training Simulation</div>
			<div class="loader-divider"></div>
			<div class="loader-row">
				<div id="status-phase">Booting Stratagem Terminal</div>
				<div id="status-percent">0%</div>
			</div>
			<div id="status-progress">
				<div id="status-progress-bar"></div>
			</div>
			<div class="loader-meta">
				<span>WASD + Arrow Keys</span>
				<span>Practice Queue Ready</span>
				<span>Web Deployment Active</span>
			</div>
			<div id="status-notice"></div>
		</div>
	</div>

	<script src="$GODOT_URL"></script>
	<script>
		const GODOT_CONFIG = $GODOT_CONFIG;
		const GODOT_THREADS_ENABLED = false;
		const engine = new Engine(GODOT_CONFIG);

		(function () {
			const statusOverlay = document.getElementById("status");
			const statusNotice = document.getElementById("status-notice");
			const statusBar = document.getElementById("status-progress-bar");
			const statusPercent = document.getElementById("status-percent");
			const statusPhase = document.getElementById("status-phase");
			const splashCandidates = ["cover.jpg", "$GODOT_SPLASH"];
			const phases = [
				"Booting Stratagem Terminal",
				"Synchronizing Destroyer Link",
				"Loading Stratagem Data",
				"Calibrating Input Relay",
				"Finalizing Mission Drill",
			];

			let initializing = true;

			function setStatusMode(mode) {
				if (!initializing) {
					return;
				}
				if (mode === "hidden") {
					statusOverlay.classList.add("hidden");
					statusOverlay.remove();
					initializing = false;
					return;
				}
				statusOverlay.classList.toggle("notice-mode", mode === "notice");
			}

			function setStatusNotice(text) {
				statusNotice.textContent = text;
			}

			function displayFailureNotice(err) {
				console.error(err);
				if (err instanceof Error) {
					setStatusNotice(err.message);
				} else if (typeof err === "string") {
					setStatusNotice(err);
				} else {
					setStatusNotice("An unknown error occurred while loading the web build.");
				}
				setStatusMode("notice");
				initializing = false;
			}

			function setProgress(current, total) {
				if (current > 0 && total > 0) {
					const ratio = Math.min(1, current / total);
					const percent = Math.round(ratio * 100);
					const phaseIndex = Math.min(phases.length - 1, Math.floor(ratio * phases.length));
					statusBar.style.width = Math.max(8, percent) + "%";
					statusPercent.textContent = percent + "%";
					statusPhase.textContent = phases[phaseIndex];
				} else {
					statusBar.style.width = "28%";
					statusPercent.textContent = "...";
				}
			}

			function tryLoaderBackground(index) {
				if (index >= splashCandidates.length) {
					return;
				}

				const nextImage = splashCandidates[index];
				const probe = new Image();
				probe.onload = function () {
					document.documentElement.style.setProperty("--loader-background-image", 'url("' + nextImage + '")');
				};
				probe.onerror = function () {
					tryLoaderBackground(index + 1);
				};
				probe.src = nextImage;
			}

			tryLoaderBackground(0);

			const missing = Engine.getMissingFeatures({
				threads: GODOT_THREADS_ENABLED,
			});

			if (missing.length !== 0) {
				const missingMessage = "The following browser features required for the web build are missing:\n\n" + missing.join("\n");
				displayFailureNotice(missingMessage);
				return;
			}

			engine.startGame({
				onProgress: function (current, total) {
					setProgress(current, total);
				},
			}).then(function () {
				setStatusMode("hidden");
			}, displayFailureNotice);
		}());
	</script>
</body>
</html>
