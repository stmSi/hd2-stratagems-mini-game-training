name: Build Exports

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  GODOT_VERSION: "4.6.1"
  GODOT_RELEASE_TAG: "4.6.1-stable"
  GODOT_EDITOR_URL: "https://github.com/godotengine/godot-builds/releases/download/4.6.1-stable/Godot_v4.6.1-stable_linux.x86_64.zip"
  GODOT_TEMPLATES_URL: "https://github.com/godotengine/godot-builds/releases/download/4.6.1-stable/Godot_v4.6.1-stable_export_templates.tpz"

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Godot editor and templates
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            .godot-ci/${{ env.GODOT_VERSION }}
            ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          key: godot-${{ runner.os }}-${{ env.GODOT_RELEASE_TAG }}

      - name: Install Godot editor and export templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail

          GODOT_DIR="$GITHUB_WORKSPACE/.godot-ci/${GODOT_VERSION}"
          TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"

          mkdir -p "$GODOT_DIR" "$TEMPLATE_DIR"

          curl -L "$GODOT_EDITOR_URL" -o /tmp/godot_editor.zip
          unzip -q /tmp/godot_editor.zip -d "$GODOT_DIR"

          EDITOR_BIN="$(find "$GODOT_DIR" -maxdepth 1 -type f -name 'Godot_v*-stable_linux.x86_64' | head -n 1)"
          mv "$EDITOR_BIN" "$GODOT_DIR/godot"
          chmod +x "$GODOT_DIR/godot"

          curl -L "$GODOT_TEMPLATES_URL" -o /tmp/godot_templates.tpz
          TMP_TEMPLATES_DIR="$(mktemp -d)"
          unzip -q /tmp/godot_templates.tpz -d "$TMP_TEMPLATES_DIR"

          if [ -d "$TMP_TEMPLATES_DIR/templates" ]; then
            cp -a "$TMP_TEMPLATES_DIR/templates/." "$TEMPLATE_DIR/"
          else
            cp -a "$TMP_TEMPLATES_DIR/." "$TEMPLATE_DIR/"
          fi

      - name: Export release builds
        shell: bash
        run: |
          set -euo pipefail

          GODOT_BIN="$GITHUB_WORKSPACE/.godot-ci/${GODOT_VERSION}/godot"
          chmod +x "$GODOT_BIN"
          rm -rf "$GITHUB_WORKSPACE/build" "$GITHUB_WORKSPACE/dist"
          mkdir -p \
            "$GITHUB_WORKSPACE/build/windows" \
            "$GITHUB_WORKSPACE/build/linux" \
            "$GITHUB_WORKSPACE/build/web" \
            "$GITHUB_WORKSPACE/dist"

          "$GODOT_BIN" --headless --path "$GITHUB_WORKSPACE" --export-release "Windows Desktop" "$GITHUB_WORKSPACE/build/windows/hd2-strategem-mini-game.exe"
          "$GODOT_BIN" --headless --path "$GITHUB_WORKSPACE" --export-release "Linux" "$GITHUB_WORKSPACE/build/linux/hd2-strategem-mini-game.x86_64"
          "$GODOT_BIN" --headless --path "$GITHUB_WORKSPACE" --export-release "Web" "$GITHUB_WORKSPACE/build/web/index.html"

      - name: Configure GitHub Pages
        if: (github.event_name == 'workflow_dispatch' || github.event_name == 'push') && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: (github.event_name == 'workflow_dispatch' || github.event_name == 'push') && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/web

      - name: Package artifacts
        shell: bash
        run: |
          set -euo pipefail

          chmod +x "$GITHUB_WORKSPACE/build/linux/hd2-strategem-mini-game.x86_64"

          zip -j "$GITHUB_WORKSPACE/dist/hd2-strategem-mini-game-windows-x86_64.zip" \
            "$GITHUB_WORKSPACE/build/windows/hd2-strategem-mini-game.exe" \
            "$GITHUB_WORKSPACE/build/windows/hd2-strategem-mini-game.pck"

          zip -j "$GITHUB_WORKSPACE/dist/hd2-strategem-mini-game-linux-x86_64.zip" \
            "$GITHUB_WORKSPACE/build/linux/hd2-strategem-mini-game.x86_64" \
            "$GITHUB_WORKSPACE/build/linux/hd2-strategem-mini-game.pck"

          (
            cd "$GITHUB_WORKSPACE/build/web"
            zip -qr "$GITHUB_WORKSPACE/dist/hd2-strategem-mini-game-web.zip" .
          )

          ls -lah "$GITHUB_WORKSPACE/dist"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: godot-exports-${{ github.sha }}
          path: dist/*
          if-no-files-found: error

      - name: Create or update GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* \
              --title "$RELEASE_TAG" \
              --generate-notes \
              --verify-tag
          fi

  deploy-pages:
    if: (github.event_name == 'workflow_dispatch' || github.event_name == 'push') && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    needs: export
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
